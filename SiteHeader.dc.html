<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
</helmet>

<div data-hdr style="position:sticky;top:0;z-index:200;background:rgba(18,20,24,0.94);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.07);transition:box-shadow .3s;font-family:'Golos Text',sans-serif">
  <div style="max-width:1280px;margin:0 auto;padding:0 28px;height:72px;display:flex;align-items:center;justify-content:space-between;gap:20px">
    <a href="index.html" style="display:flex;align-items:center;gap:13px;flex-shrink:0;text-decoration:none">
      <span style="position:relative;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center">
        <span style="position:absolute;inset:0;border:2px solid #CBA14A;border-radius:50%"></span>
        <span style="position:absolute;inset:7px;border:1.5px solid rgba(203,161,74,0.55);border-radius:50%"></span>
        <span style="position:absolute;width:34px;height:1.5px;background:#CBA14A"></span>
        <span style="position:absolute;width:1.5px;height:34px;background:#CBA14A"></span>
        <span style="position:absolute;width:5px;height:5px;background:#CBA14A;border-radius:50%"></span>
      </span>
      <span style="display:flex;flex-direction:column;line-height:1">
        <span style="font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;letter-spacing:2.5px;color:#EDEBE6">ЕВРАЗИЯ</span>
        <span style="font-size:9px;letter-spacing:3px;color:#8C887F;margin-top:3px">СТРЕЛКОВОЕ ОБЩЕСТВО</span>
      </span>
    </a>

    <nav data-desktop-nav style="display:flex;align-items:center;gap:26px">
      <a data-nav="home" data-active="0" href="index.html" style="position:relative;font-size:14px;color:#AEB0B4;letter-spacing:.3px;text-decoration:none;padding:4px 0;transition:color .2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color=this.getAttribute('data-active')==='1'?'#CBA14A':'#AEB0B4'">Главная<span data-ul style="position:absolute;left:0;right:0;bottom:-4px;height:2px;background:#CBA14A;transform:scaleX(0);transform-origin:left;transition:transform .25s"></span></a>
      <a data-nav="about" data-active="0" href="about.html" style="position:relative;font-size:14px;color:#AEB0B4;letter-spacing:.3px;text-decoration:none;padding:4px 0;transition:color .2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color=this.getAttribute('data-active')==='1'?'#CBA14A':'#AEB0B4'">Об обществе<span data-ul style="position:absolute;left:0;right:0;bottom:-4px;height:2px;background:#CBA14A;transform:scaleX(0);transform-origin:left;transition:transform .25s"></span></a>
      <a data-nav="training" data-active="0" href="training.html" style="position:relative;font-size:14px;color:#AEB0B4;letter-spacing:.3px;text-decoration:none;padding:4px 0;transition:color .2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color=this.getAttribute('data-active')==='1'?'#CBA14A':'#AEB0B4'">Направления<span data-ul style="position:absolute;left:0;right:0;bottom:-4px;height:2px;background:#CBA14A;transform:scaleX(0);transform-origin:left;transition:transform .25s"></span></a>
      <a data-nav="events" data-active="0" href="events.html" style="position:relative;font-size:14px;color:#AEB0B4;letter-spacing:.3px;text-decoration:none;padding:4px 0;transition:color .2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color=this.getAttribute('data-active')==='1'?'#CBA14A':'#AEB0B4'">Соревнования<span data-ul style="position:absolute;left:0;right:0;bottom:-4px;height:2px;background:#CBA14A;transform:scaleX(0);transform-origin:left;transition:transform .25s"></span></a>
      <a data-nav="prices" data-active="0" href="prices.html" style="position:relative;font-size:14px;color:#AEB0B4;letter-spacing:.3px;text-decoration:none;padding:4px 0;transition:color .2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color=this.getAttribute('data-active')==='1'?'#CBA14A':'#AEB0B4'">Цены<span data-ul style="position:absolute;left:0;right:0;bottom:-4px;height:2px;background:#CBA14A;transform:scaleX(0);transform-origin:left;transition:transform .25s"></span></a>
      <a data-nav="gallery" data-active="0" href="gallery.html" style="position:relative;font-size:14px;color:#AEB0B4;letter-spacing:.3px;text-decoration:none;padding:4px 0;transition:color .2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color=this.getAttribute('data-active')==='1'?'#CBA14A':'#AEB0B4'">Галерея<span data-ul style="position:absolute;left:0;right:0;bottom:-4px;height:2px;background:#CBA14A;transform:scaleX(0);transform-origin:left;transition:transform .25s"></span></a>
      <a data-nav="contacts" data-active="0" href="contacts.html" style="position:relative;font-size:14px;color:#AEB0B4;letter-spacing:.3px;text-decoration:none;padding:4px 0;transition:color .2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color=this.getAttribute('data-active')==='1'?'#CBA14A':'#AEB0B4'">Контакты<span data-ul style="position:absolute;left:0;right:0;bottom:-4px;height:2px;background:#CBA14A;transform:scaleX(0);transform-origin:left;transition:transform .25s"></span></a>
    </nav>

    <div style="display:flex;align-items:center;gap:16px;flex-shrink:0">
      <a data-phone-link href="tel:+79122305649" style="font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:.6px;color:#EDEBE6;white-space:nowrap;text-decoration:none">+7 (912) 230-56-49</a>
      <a href="contacts.html" style="background:#CBA14A;color:#15171B;font-weight:600;font-size:14px;padding:11px 22px;border-radius:3px;letter-spacing:.3px;text-decoration:none;transition:background .2s,transform .2s" onmouseover="this.style.background='#E0B85C';this.style.transform='translateY(-1px)'" onmouseout="this.style.background='#CBA14A';this.style.transform='translateY(0)'">Записаться</a>
      <button aria-label="Меню" onClick="{{ toggleMenu }}" style="display:none;background:none;border:none;color:#EDEBE6;cursor:pointer;padding:4px" data-burger>
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/></svg>
      </button>
    </div>
  </div>

  <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
    <div style="border-top:1px solid rgba(255,255,255,0.07);background:rgba(16,18,21,0.99);padding:10px 28px 20px;display:flex;flex-direction:column">
      <a href="index.html" style="padding:13px 0;font-size:16px;color:#E8E6E1;text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.05)">Главная</a>
      <a href="about.html" style="padding:13px 0;font-size:16px;color:#E8E6E1;text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.05)">Об обществе</a>
      <a href="training.html" style="padding:13px 0;font-size:16px;color:#E8E6E1;text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.05)">Направления</a>
      <a href="events.html" style="padding:13px 0;font-size:16px;color:#E8E6E1;text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.05)">Соревнования</a>
      <a href="prices.html" style="padding:13px 0;font-size:16px;color:#E8E6E1;text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.05)">Цены</a>
      <a href="gallery.html" style="padding:13px 0;font-size:16px;color:#E8E6E1;text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.05)">Галерея</a>
      <a href="contacts.html" style="padding:13px 0;font-size:16px;color:#E8E6E1;text-decoration:none">Контакты</a>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:72},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;home&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;about&quot;,&quot;training&quot;,&quot;events&quot;,&quot;prices&quot;,&quot;gallery&quot;,&quot;contacts&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { menuOpen: false };
  toggleMenu = () => this.setState(s => ({ menuOpen: !s.menuOpen }));

  componentDidMount() {
    this.markActive();
    this.applyResponsive();
    this._r = () => this.applyResponsive();
    window.addEventListener('resize', this._r);
    this._s = () => {
      const h = (this.el || document).querySelector('[data-hdr]');
      if (h) h.style.boxShadow = window.scrollY > 8 ? '0 8px 30px rgba(0,0,0,0.4)' : 'none';
    };
    window.addEventListener('scroll', this._s, { passive: true });
    this._s();
  }
  componentDidUpdate() { this.applyResponsive(); }
  componentWillUnmount() {
    window.removeEventListener('resize', this._r);
    window.removeEventListener('scroll', this._s);
  }

  markActive() {
    const a = this.props.active;
    if (!a) return;
    const root = this.el || document;
    const link = root.querySelector('[data-nav="' + a + '"]');
    if (link) {
      link.style.color = '#CBA14A';
      link.setAttribute('data-active', '1');
      const u = link.querySelector('[data-ul]');
      if (u) u.style.transform = 'scaleX(1)';
    }
  }

  applyResponsive() {
    const root = this.el || document;
    const w = window.innerWidth;
    const nav = root.querySelector('[data-desktop-nav]');
    const burger = root.querySelector('[data-burger]');
    const phone = root.querySelector('[data-phone-link]');
    if (nav) nav.style.display = w < 1040 ? 'none' : 'flex';
    if (burger) burger.style.display = w < 1040 ? 'flex' : 'none';
    if (phone) phone.style.display = w < 760 ? 'none' : 'inline';
    if (w >= 1040 && this.state.menuOpen) this.setState({ menuOpen: false });
  }

  renderVals() {
    return { menuOpen: this.state.menuOpen, toggleMenu: this.toggleMenu };
  }
}
</script>
</body>
</html>
